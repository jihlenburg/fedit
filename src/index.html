<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fedit</title>

    <!-- Preconnect to Google Fonts for faster first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>fedit</h1>
      <p class="tagline">a tiny editor, built on Tauri 2</p>

      <form class="row" id="greet-form">
        <input id="greet-input" placeholder="your name" autocomplete="off" />
        <button type="submit">Say hi</button>
      </form>
      <p id="greet-msg" aria-live="polite"></p>

      <form class="row" id="echo-form">
        <input id="echo-input" placeholder="say something" autocomplete="off" />
        <button type="submit" class="ghost">Echo</button>
      </form>
      <p id="echo-msg" aria-live="polite"></p>

      <div class="row">
        <button id="open-btn" class="ghost">Open a file…</button>
        <button id="save-btn" class="ghost">Save</button>
        <button id="save-as-btn" class="ghost">Save as…</button>
        <button id="find-btn" class="ghost">Find…</button>
      </div>

      <!-- Find/replace bar: hidden by default, toggled by Ctrl/Cmd+F or the Find button. -->
      <div class="find-bar" id="find-bar" hidden aria-label="find and replace">
        <input id="find-input" placeholder="find" autocomplete="off" />
        <input id="replace-input" placeholder="replace with (optional)" autocomplete="off" />
        <label class="find-opt"><input type="checkbox" id="find-regex" /> regex</label>
        <label class="find-opt"><input type="checkbox" id="find-case" /> Aa</label>
        <button id="find-next-btn" class="ghost" type="button">Next</button>
        <button id="find-prev-btn" class="ghost" type="button">Prev</button>
        <button id="replace-all-btn" class="ghost" type="button">Replace all</button>
        <button id="find-close-btn" class="ghost" type="button" aria-label="close find">✕</button>
        <span id="find-count" class="find-count"></span>
      </div>

      <p class="path-line" id="path-view">
        <span id="dirty-dot" hidden aria-label="unsaved changes">●</span>
        <span id="path-text"></span>
      </p>

      <!-- Tab strip: one chip per open file + a new-tab button.
           Rendered from list_tabs(); JS owns per-tab editor-buffer state. -->
      <div class="tab-bar" id="tab-bar" role="tablist" aria-label="open files"></div>

      <div class="editor-wrap">
        <div class="gutter" id="gutter" aria-hidden="true"></div>
        <textarea
          id="editor"
          rows="16"
          spellcheck="false"
          placeholder="open a file, or start typing here"
        ></textarea>
      </div>

      <details id="recent-wrap">
        <summary>Recent files</summary>
        <ul id="recent-list"></ul>
      </details>

      <!-- Settings panel (ch24). Values come from get_settings on boot and
           persist through set_settings; the Rust side emits
           fedit:settings-changed for hot-apply. -->
      <details id="settings-wrap">
        <summary>Settings</summary>
        <div class="settings-panel">
          <label>
            Font size
            <input type="number" id="set-font-size" min="10" max="32" step="1" />
            <span class="hint">px — editor only</span>
          </label>
          <label>
            Tab width
            <input type="number" id="set-tab-width" min="1" max="8" step="1" />
            <span class="hint">spaces per Tab key</span>
          </label>
        </div>
      </details>
    </main>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fedit</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>fedit</h1>
      <p class="tagline">a tiny editor, built on Tauri 2</p>

      <form class="row" id="greet-form">
        <input id="greet-input" placeholder="your name" />
        <button type="submit">Say hi</button>
      </form>
      <p id="greet-msg"></p>

      <form class="row" id="echo-form">
        <input id="echo-input" placeholder="say something" />
        <button type="submit" class="ghost">Echo</button>
      </form>
      <p id="echo-msg"></p>

      <div class="row">
        <button id="open-btn" class="ghost">Open a file…</button>
        <button id="save-btn" class="ghost">Save</button>
      </div>
      <p id="path-view" class="tagline"></p>
      <textarea id="editor" rows="16" placeholder="open a file, or start typing here"></textarea>
    </main>
  </body>
</html>
